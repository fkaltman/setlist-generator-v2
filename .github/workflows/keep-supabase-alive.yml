name: Keep Supabase Alive

on:
  schedule:
    # Runs every 5 days at midnight UTC (well within the 7-day pause window)
    - cron: '0 0 */5 * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent pausing
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/songs?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
